<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>__TITLE__ - 知识图谱</title>

<body>

<header id="graph-header">
  <div class="header-left">
    <span class="header-brand">ExamPass Assistant</span>
    <span class="header-sep">|</span>
    <span class="header-title" id="header-title">__TITLE__ - 知识图谱</span>
  </div>
  <div class="header-right">
    <input type="text" id="search-input" placeholder="搜索知识点..." />
    <button id="reset-btn" title="重置视图">↺</button>
  </div>
</header>

<div id="graph-viewport">
  <div id="tree-panel">
    <div id="graph-canvas"></div>
    <svg id="connections-layer"></svg>
  </div>
  <div id="notes-panel">
    <div id="np-placeholder">← 点击左侧叶节点<br/>查看或编辑笔记</div>
    <div id="np-content">
      <div id="np-title"></div>
      <div class="np-toolbar">
        <button id="np-bold" title="加粗 (Ctrl+B)"><b>B</b></button>
        <span class="np-hint">Ctrl+V 粘贴图片</span>
      </div>
      <div id="np-body" contenteditable="true" data-ph="在此记笔记…支持 Ctrl+B 加粗、Ctrl+V 粘贴图片"></div>
      <div id="np-images"></div>
    </div>
  </div>
</div>

<div id="zoom-bar">
  <button id="zoom-out">−</button>
  <input type="range" id="zoom-slider" min="50" max="200" value="100" step="10" />
  <button id="zoom-in">+</button>
  <span id="zoom-label">100%</span>
</div>

<div id="tooltip" class="tooltip-hidden"></div>
<div id="toast"></div>

<script>

</body>
</html>
